<!DOCTYPE html>
<html>
<head>
    <title>Sorteio Atlantix</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #ff6b35, #f7931e); margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { color: #ff6b35; }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: #ff6b35; color: white; padding: 12px 30px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        #painelAdmin { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; }
        .painel-conteudo { background: #1a1a1a; color: white; max-width: 600px; margin: 50px auto; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 SORTEIO ATLANTIX 🔥</h1>
        <p>Cadastre seu @ do Instagram e concorra!</p>
        <input type="text" id="instagram" placeholder="@seuinstagram">
        <button onclick="participar()">QUERO PARTICIPAR</button>
        <p id="contador">0 pessoas participando</p>
        <p id="msg"></p>
    </div>

    <div id="painelAdmin">
        <div class="painel-conteudo">
            <h2>🔒 PAINEL DO SORTEIO - ADMIN</h2>
            <p>Total: <span id="totalAdmin">0</span></p>
            <div id="listaAdmin" style="max-height: 200px; overflow-y: auto; background: #333; padding: 10px; margin: 10px 0;"></div>
            <button onclick="sortear()" style="background: #00c851;">🎲 SORTEAR AGORA</button>
            <button onclick="fecharPainel()" style="background: #ff4444;">FECHAR</button>
            <h3 id="resultado"></h3>
        </div>
    </div>

    <script>
        let participantes = JSON.parse(localStorage.getItem('sorteio_atlantix')) || [];
        
        function atualizarContador() {
            document.getElementById('contador').textContent = participantes.length + ' pessoas participando';
            document.getElementById('totalAdmin').textContent = participantes.length;
        }
        
        function participar() {
            const insta = document.getElementById('instagram').value.trim();
            if (!insta) { alert('Digite seu @'); return; }
            if (!insta.startsWith('@')) { alert('Comece com @'); return; }
            if (participantes.includes(insta)) { alert('Você já está participando!'); return; }
            participantes.push(insta);
            localStorage.setItem('sorteio_atlantix', JSON.stringify(participantes));
            document.getElementById('msg').textContent = '✅ Cadastrado com sucesso!';
            document.getElementById('instagram').value = '';
            atualizarContador();
        }
        
        function sortear() {
            if (participantes.length === 0) { alert('Ninguém cadastrado'); return; }
            const sorteado = participantes[Math.floor(Math.random() * participantes.length)];
            document.getElementById('resultado').innerHTML = '🎉 GANHADOR: ' + sorteado + ' 🎉';
        }
        
        function fecharPainel() {
            document.getElementById('painelAdmin').style.display = 'none';
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'A') {
                const senha = prompt('Digite a senha de admin:');
                if (senha === 'atlantix2026') {
                    document.getElementById('painelAdmin').style.display = 'block';
                    let lista = '';
                    participantes.forEach(p => lista += p + '<br>');
                    document.getElementById('listaAdmin').innerHTML = lista || 'Nenhum participante';
                } else {
                    alert('Senha incorreta');
                }
            }
        });
        
        atualizarContador();
    </script>
</body>
</html>
