<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja do Rodnei</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #0077ff;
            margin-bottom: 30px;
        }
        .produto {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            max-width: 300px;
        }
        .produto img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .produto h2 {
            margin: 10px 0;
            color: #fff;
        }
        .preco {
            font-size: 24px;
            color: #00ff88;
            font-weight: bold;
            margin: 15px 0;
        }
        .btn-zap {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .btn-zap:hover {
            background-color: #1da851;
        }
    </style>
</head>
<body>
    <h1>🔥 Loja do Rodnei 🔥</h1>

    <div class="produto">
        <img src="https://via.placeholder.com/300x300.png?text=Sua+Foto+Aqui" alt="Produto 1">
        <h2>Camiseta Estilosa</h2>
        <div class="preco">R$ 49,90</div>
        <button class="btn-zap" onclick="comprar('Camiseta Estilosa')">
            Comprar no WhatsApp
        </button>
    </div>

    <div class="produto">
        <img src="https://via.placeholder.com/300x300.png?text=Sua+Foto+Aqui" alt="Produto 2">
        <h2>Boné do Brabo</h2>
        <div class="preco">R$ 35,00</div>
        <button class="btn-zap" onclick="comprar('Boné do Brabo')">
            Comprar no WhatsApp
        </button>
    </div>

    <div class="produto">
        <img src="https://via.placeholder.com/300x300.png?text=Sua+Foto+Aqui" alt="Produto 3">
        <h2>Calça Top</h2>
        <div class="preco">R$ 89,90</div>
        <button class="btn-zap" onclick="comprar('Calça Top')">
            Comprar no WhatsApp
        </button>
    </div>

    <script>
        function comprar(nomeProduto) {
            let numero = "554888732069";
            let mensagem = `Olá Rodnei! Quero comprar: ${nomeProduto}`;
            let link = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
            window.open(link, '_blank');
        }
    </script>
</body>
</html>
